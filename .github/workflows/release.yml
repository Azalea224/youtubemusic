name: Build and Publish Release

on:
  push:
    tags:
      - "v*"

# Grant write permissions globally so all jobs can interact with Releases
permissions:
  contents: write

jobs:
  release-linux-amd64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install fpm and distro packaging tools (deb/rpm/pacman)
        run: |
          sudo apt-get update
          # libarchive-tools provides bsdtar; fpm needs it for -t pacman (.MTREE) on Ubuntu
          sudo apt-get install -y ruby ruby-dev build-essential rpm fakeroot dpkg-dev libarchive-tools
          sudo gem install fpm
      - run: npm ci
      - run: npm run electron:build -- --linux --publish never
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            release/YouTubeMusic-*.AppImage
            release/YouTubeMusic-*.pkg.tar.*
            release/YouTubeMusic-*.deb
            release/YouTubeMusic-*.rpm

  release-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install fpm and distro packaging tools (deb/rpm/pacman)
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm fakeroot dpkg-dev libarchive-tools
          sudo gem install fpm
      - run: npm ci
      - run: npm run electron:build -- --linux AppImage pacman deb rpm --arm64 --publish never
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: |
            release/YouTubeMusic-*.AppImage
            release/YouTubeMusic-*.pkg.tar.*
            release/YouTubeMusic-*.deb
            release/YouTubeMusic-*.rpm

  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run electron:build -- --win --publish never
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          # Portable only (matches artifactName in package.json). Omit release/ — win-unpacked/ has many .exe.
          path: release/YouTubeMusic-*.exe

  publish-release:
    needs: [release-linux-amd64, release-linux-arm64, release-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Display structure of downloaded artifacts
        run: ls -R artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          # Use the tag name from the push event
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          # Match package.json artifactName: YouTubeMusic-${version}-${os}-${arch}.${ext}
          # Do not use **/*.exe — win-unpacked/ contains many Chromium helper .exe files.
          files: |
            artifacts/**/YouTubeMusic-*.AppImage
            artifacts/**/YouTubeMusic-*-win-*.exe
            artifacts/**/YouTubeMusic-*.pkg.tar.*
            artifacts/**/YouTubeMusic-*.deb
            artifacts/**/YouTubeMusic-*.rpm